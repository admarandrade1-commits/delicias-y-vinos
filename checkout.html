<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finalizar Encomenda — Delicias y Vinos</title>
  <link rel="stylesheet" href="css/style.css?v=6"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    .checkout-page { min-height: 100vh; background: var(--cream); padding-top: calc(var(--header-h) + 40px); padding-bottom: 60px; }
    .checkout-grid { display: grid; grid-template-columns: 1fr 380px; gap: 32px; max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .checkout-form-box, .checkout-summary { background: #fff; padding: 32px; border: 1px solid var(--border); }
    .checkout-form-box h2, .checkout-summary h2 { font-family: var(--font-display); font-size: 24px; font-weight: 400; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid var(--border); font-family: var(--font-body); font-size: 14px; outline: none; transition: border 0.2s; background: #fff; }
    .form-group input:focus, .form-group select:focus { border-color: var(--gold); }
    .summary-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .summary-item img { width: 50px; height: 50px; object-fit: cover; margin-right: 12px; }
    .summary-item-info { flex: 1; }
    .summary-total { display: flex; justify-content: space-between; padding: 16px 0; font-size: 16px; font-weight: 600; border-top: 2px solid #111; margin-top: 8px; }
    .success-box { display: none; text-align: center; padding: 48px 24px; }
    .success-box h2 { font-family: var(--font-display); font-size: 32px; color: #2e7d32; margin-bottom: 12px; }
    .success-box p { color: #666; margin-bottom: 24px; }
    @media (max-width: 768px) { .checkout-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="header" id="header">
    <div class="header__top">
      <span>Envío gratuito desde 60€ · Entrega en 24/48h</span>
      <span><a href="mailto:pedidos@deliciasyvinos.com">pedidos@deliciasyvinos.com</a></span>
    </div>
    <div class="header__main">
      <a href="index.html" class="header__logo"><img src="https://www.deliciasyvinos.com/themes/deliciasyvinos/_img/logo.png" alt="Delicias y Vinos" style="height:60px;width:auto;"/></a>
    </div>
  </header>

  <main class="checkout-page">
    <!-- Formulário -->
    <div class="checkout-grid" id="checkout-grid">
      <div class="checkout-form-box">
        <h2>Dados de Entrega</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Nome</label>
            <input type="text" id="co-nome" placeholder="O teu nome"/>
          </div>
          <div class="form-group">
            <label>Apelido</label>
            <input type="text" id="co-apelido" placeholder="O teu apelido"/>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="co-email" placeholder="email@exemplo.com"/>
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="tel" id="co-telefone" placeholder="+34 600 000 000"/>
        </div>
        <div class="form-group">
          <label>Morada</label>
          <input type="text" id="co-morada" placeholder="Rua, número, andar"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Código Postal</label>
            <input type="text" id="co-cp" placeholder="00000"/>
          </div>
          <div class="form-group">
            <label>Cidade</label>
            <input type="text" id="co-cidade" placeholder="Cidade"/>
          </div>
        </div>
        <div class="form-group">
          <label>País</label>
          <select id="co-pais">
            <option value="España">España</option>
            <option value="Portugal">Portugal</option>
            <option value="França">França</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <h2 style="margin-top:24px;">Método de Pagamento</h2>
        <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px;">
          <label style="display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--border);cursor:pointer;">
            <input type="radio" name="pagamento" value="cartao" checked/> 💳 Cartão de Crédito/Débito
          </label>
          <label style="display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--border);cursor:pointer;">
            <input type="radio" name="pagamento" value="transferencia"/> 🏦 Transferência Bancária
          </label>
          <label style="display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--border);cursor:pointer;">
            <input type="radio" name="pagamento" value="entrega"/> 💵 Pagamento na Entrega
          </label>
        </div>

        <div id="form-error" style="display:none;background:#fee;border:1px solid #fcc;color:#c33;padding:10px;margin-bottom:12px;font-size:13px;"></div>
        <button onclick="confirmarEncomenda()" class="btn btn--gold btn--full" style="padding:16px;font-size:14px;letter-spacing:0.1em;">CONFIRMAR ENCOMENDA →</button>
      </div>

      <!-- Resumo -->
      <div class="checkout-summary">
        <h2>Resumo</h2>
        <div id="summary-items"></div>
        <div class="summary-total">
          <span>Total</span>
          <span id="summary-total">0,00€</span>
        </div>
        <div style="font-size:12px;color:#999;margin-top:12px;">Envio gratuito a partir de 60€</div>
      </div>
    </div>

    <!-- Sucesso -->
    <div class="success-box" id="success-box">
      <div style="font-size:64px;margin-bottom:16px;">✅</div>
      <h2>Encomenda Confirmada!</h2>
      <p id="success-msg">A tua encomenda foi registada com sucesso.</p>
      <a href="index.html" class="btn btn--gold" style="padding:14px 32px;">← Voltar à Loja</a>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script>
    // Carregar resumo do carrinho
    function loadSummary() {
      const saved = localStorage.getItem('dyv_products');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed)) { PRODUCTS.length = 0; parsed.forEach(p => PRODUCTS.push(p)); }
        } catch(e) {}
      }

      const itemsEl = document.getElementById('summary-items');
      const totalEl = document.getElementById('summary-total');
      let total = 0;
      let html = '';

      if (cart.length === 0) {
        itemsEl.innerHTML = '<p style="color:#999;text-align:center;">Carrinho vazio</p>';
        return;
      }

      cart.forEach(item => {
        const p = getProductById(item.id);
        if (!p) return;
        const sub = p.precio * item.qty;
        total += sub;
        html += `
          <div class="summary-item">
            <img src="${p.imagen}" alt="${p.nombre}"/>
            <div class="summary-item-info">
              <div style="font-weight:500;">${p.nombre}</div>
              <div style="color:#999;font-size:12px;">x${item.qty}</div>
            </div>
            <div style="font-weight:600;">${sub.toFixed(2).replace('.',',')}€</div>
          </div>`;
      });

      itemsEl.innerHTML = html;
      totalEl.textContent = total.toFixed(2).replace('.',',') + '€';
    }

    function confirmarEncomenda() {
      const nome = document.getElementById('co-nome').value.trim();
      const apelido = document.getElementById('co-apelido').value.trim();
      const email = document.getElementById('co-email').value.trim();
      const telefone = document.getElementById('co-telefone').value.trim();
      const morada = document.getElementById('co-morada').value.trim();
      const cp = document.getElementById('co-cp').value.trim();
      const cidade = document.getElementById('co-cidade').value.trim();
      const pais = document.getElementById('co-pais').value;
      const pagamento = document.querySelector('input[name="pagamento"]:checked').value;
      const errorEl = document.getElementById('form-error');

      if (!nome || !email || !morada || !cidade) {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Por favor preenche todos os campos obrigatórios.';
        return;
      }

      const total = cart.reduce((sum, item) => {
        const p = getProductById(item.id);
        return sum + (p ? p.precio * item.qty : 0);
      }, 0);

      const encomenda = {
        id: Date.now(),
        data: new Date().toLocaleString('pt-PT'),
        nome: nome + ' ' + apelido,
        email, telefone,
        morada: `${morada}, ${cp} ${cidade}, ${pais}`,
        pagamento,
        produtos: cart.map(item => {
          const p = getProductById(item.id);
          return { nome: p ? p.nombre : item.id, qty: item.qty, preco: p ? p.precio : 0 };
        }),
        total: total.toFixed(2),
        estado: 'Pendente'
      };

      const encomendas = JSON.parse(localStorage.getItem('dyv_orders') || '[]');
      encomendas.push(encomenda);
      localStorage.setItem('dyv_orders', JSON.stringify(encomendas));

      cart = [];
      saveCart();

      document.getElementById('checkout-grid').style.display = 'none';
      document.getElementById('success-box').style.display = 'block';
      document.getElementById('success-msg').textContent =
        `Encomenda #${encomenda.id} registada! Receberás confirmação em ${email}.`;
    }

    document.addEventListener('DOMContentLoaded', loadSummary);
  </script>
</body>
</html>
